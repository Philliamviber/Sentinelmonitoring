name: Validate content

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate all JSON parses
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "::error file=$f::Invalid JSON"
              fail=1
            else
              echo "OK  $f"
            fi
          done < <(find . -name '*.json' -print0)
          exit $fail

      - name: Validate hunting-query YAML
        run: |
          python3 - <<'PY'
          import glob, sys, yaml
          bad = 0
          for f in glob.glob('hunting-queries/*.yaml'):
              try:
                  with open(f) as fh:
                      d = yaml.safe_load(fh)
                  for k in ('id', 'name', 'query'):
                      assert k in d, f"missing '{k}'"
                  print("OK ", f)
              except Exception as e:
                  print(f"::error file={f}::{e}")
                  bad = 1
          sys.exit(bad)
          PY
